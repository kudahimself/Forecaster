# nginx config for the dockerised frontend image.
# - Serves Vite-built static files from /usr/share/nginx/html.
# - Proxies /api/* to the backend service (docker-compose DNS).
# - SPA fallback: unknown routes return index.html so React Router works.

upstream django_backend {
    server backend:8000;
}

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API → Django
    location /api/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Assets with long cache
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA: anything else, fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
