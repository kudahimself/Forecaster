# GICS sector mapping for the `liquid_us_large_cap` universe.
# Based on S&P 500 GICS classifications as of ~2025.
# Structure is sector -> list of tickers for readability.
#
# Notes on edge cases:
#  - V, MA, PYPL are Financials (Transaction & Payment Processing Services),
#    not IT — classified per GICS, not popular intuition.
#  - GOOG/GOOGL, META, NFLX, DIS, CMCSA are Communication Services (post-2018
#    GICS restructure), not IT or Consumer Discretionary.
#  - ADP is Industrials (Professional Services), not IT.
#  - BRK-B uses yfinance's hyphenated convention, not the "BRK.B" form.
name: gics_sectors_us
as_of: "2025-01-01"
source: "GICS sector classification, manually curated for the liquid_us_large_cap universe"
