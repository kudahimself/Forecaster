name: tests

on:
  push:
    branches: [main, rewrite-research-tracker]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (Python 3.10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system deps
        run: |
          # Lightweight: CVXPY/osqp/scs wheels ship manylinux binaries.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ./sdk

      - name: Django system check
        run: python backend/manage.py check

      - name: Run tests
        run: python backend/manage.py test --verbosity 1

  frontend:
    name: Frontend build + typecheck (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Type-check + build
        working-directory: frontend
        run: npm run build
